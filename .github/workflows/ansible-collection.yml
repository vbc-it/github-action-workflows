---
name: ansible-collection-tests
on:
  workflow_call:
    inputs:
      platform:
        description: 'The platform to run sanity tests on'
        required: true
        default: 'ubuntu-latest'
        type: string
      collection-path:
        description: 'Path to the Ansible collection root'
        required: false
        default: '.'
        type: string
      force_all_roles:
        description: 'Set to true to run all roles regardless of the changeset'
        required: false
        default: false
        type: boolean

concurrency:
  group: >-
    ${{ github.workflow }}-${{
      github.event.pull_request.number || github.sha
    }}
  cancel-in-progress: true

jobs:

  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12.12'
      - uses: pre-commit/action@v3.0.1

###
# Sanity tests (REQUIRED)
#
# https://docs.ansible.com/ansible/latest/dev_guide/testing_sanity.html

  sanity:
    name: Sanity (Ⓐ${{ matrix.ansible }})
    strategy:
      matrix:
        ansible:
          # It's important that Sanity is tested against all stable-X.Y branches
          # Testing against `devel` may fail as new tests are added.
          # An alternative to `devel` is the `milestone` branch with
          # gets synchronized with `devel` every few weeks and therefore
          # tends to be a more stable target. Be aware that it is not updated
          # around creation of a new stable branch, this might cause a problem
          # that two different versions of ansible-test use the same sanity test
          # ignore.txt file.
          # Add new versions announced in
          # https://github.com/ansible-collections/news-for-maintainers in a timely manner,
          # consider dropping testing against EOL versions and versions you don't support.
          - stable-2.16
          - stable-2.17
          - stable-2.18
        # - milestone

    runs-on: ubuntu-latest

    steps:
      # Run sanity tests inside a Docker container.
      # The docker container has all the pinned dependencies that are
      # required and all Python versions Ansible supports.
      - name: Perform sanity testing
        # See the documentation for the following GitHub action on
        # https://github.com/ansible-community/ansible-test-gh-action/blob/main/README.md
        uses: ansible-community/ansible-test-gh-action@release/v1
        with:
          ansible-core-version: ${{ matrix.ansible }}
          testing-type: sanity
          collection-root: ${{ inputs.collection-path }}
          # OPTIONAL If your sanity tests require code
          # from other collections, install them like this
          # test-deps: >-
          #   ansible.netcommon
          #   ansible.utils
          # OPTIONAL If set to true, will test only against changed files,
          # which should improve CI performance. See limitations on
          # https://github.com/ansible-community/ansible-test-gh-action#pull-request-change-detection
          pull-request-change-detection: false


  discover:
    runs-on: ubuntu-latest
    needs: sanity
    outputs:
      roles: ${{ steps.transform.outputs.directories }}
    steps:
      - uses: actions/checkout@v6

      # Add a step to detect the event type
      - name: Set test scope
        id: scope
        run: |
          if [[ "${{ inputs.force_all_roles }}" == "true" ]]; then
            echo "all_roles=true" >> $GITHUB_OUTPUT
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" || "${{ github.event_name }}" == "schedule" ]]; then
            echo "all_roles=true" >> $GITHUB_OUTPUT
          else
            echo "all_roles=false" >> $GITHUB_OUTPUT
          fi

      # Add a step to list all roles when running full tests
      - name: List all roles
        id: list-roles
        if: steps.scope.outputs.all_roles == 'true'
        run: |
          echo "role_folders=$(find ${{ inputs.collection-path }}/roles/* -maxdepth 0 -type d -exec basename {} \; | tr '\n' ' ')" >> $GITHUB_OUTPUT

      - name: Find changeset
        if: steps.scope.outputs.all_roles == 'false'
        uses: dorny/paths-filter@v2
        id: filter
        with:
          base: ${{ github.ref }}
          list-files: shell
          filters: |
            role:
              - ${{ inputs.collection-path }}/roles/*/**

      - name: Transform to directories
        id: transform
        continue-on-error: false
        run: |
          if [[ "${{ steps.scope.outputs.all_roles }}" == "true" ]]; then
            folders="${{ steps.list-roles.outputs.role_folders }}"
          else
            folders=()
            for f in ${{ steps.filter.outputs.role_files }};
              do
               echo "Adding $(dirname $f) to folders";
               folders+=($(basename "$(dirname "$f")"));
            done
          fi
          unique_folders=($(printf "%s\n" "${folders[@]}" | sort -u | tr '\n' ' '))
          echo "Found ${#unique_folders[@]} roles";
          existing_folders=()
          echo "Checking if roles still exists ";
          for folder in ${unique_folders[*]};
            do
              echo "Checking if roles/$folder exists";
               if [ -d "${{ inputs.collection-path }}/roles/$folder" ]; then
                   if [ -d "${{ inputs.collection-path }}/roles/$folder/molecule" ]; then
                     echo "${{ inputs.collection-path }}/roles/$folder has molecule tests";
                     existing_folders+=("$folder")
                   else
                     echo "${{ inputs.collection-path }}/roles/$folder has no molecule directory, skipping";
                   fi
               fi
             done
          echo "directories=$(jq --compact-output --null-input '$ARGS.positional' --args -- ${existing_folders[@]})" >> $GITHUB_OUTPUT

  molecule:
    needs: discover
    runs-on: ${{ inputs.platform }}
    if: ${{ needs.discover.outputs.roles != '' && toJson(fromJson(needs.discover.outputs.roles)) != '[]' }}
    strategy:
      matrix:
        role: ${{ fromJSON(needs.discover.outputs.roles) }}
      fail-fast: false
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        if: ${{ inputs.platform == 'ubuntu-latest' }}
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install Molecule and dependencies
        if: ${{ inputs.platform == 'ubuntu-latest' }}
        run: |
          pip install ansible molecule-plugins[docker] molecule-plugins[podman] docker

      - name: Prepare Python and Molecule on self-hosted
        if: ${{ inputs.platform != 'ubuntu-latest' }}
        run: |
          if ! command -v python3 >/dev/null 2>&1; then
            echo "python3 is required on the self-hosted runner" >&2
            exit 1
          fi
          python3 -m ensurepip --upgrade || true
          python3 -m pip install --user --upgrade pip
          python3 -m pip install --user ansible molecule-plugins[docker] molecule-plugins[podman] docker
          echo "${HOME}/.local/bin" >> $GITHUB_PATH

      - name: Run molecule tests for role ${{ matrix.role }}
        run: |
          molecule --version
          cd "${{ inputs.collection-path }}/roles/${{ matrix.role }}"
          molecule test --all --parallel
        env:
          PY_COLORS: '1'
          ANSIBLE_FORCE_COLOR: '1'
          ANSIBLE_ROLES_PATH: "${GITHUB_WORKSPACE}/${{ inputs.collection-path }}/roles:~/.ansible/roles:/usr/share/ansible/roles:/etc/ansible/roles"

  check:  # This job does nothing and is only used for the branch protection
          # or multi-stage CI jobs, like making sure that all tests pass before
          # a publishing job is started.
    if: always()

    needs:
      - pre-commit
      - sanity
      - molecule

    runs-on: "ubuntu-latest"

    steps:
      - name: Decide whether the needed jobs succeeded or failed
        uses: re-actors/alls-green@release/v1
        with:
          jobs: ${{ toJSON(needs) }}
          allowed-skips: molecule
