---
name: ansible-collection-tests
on:
  workflow_call:
    inputs:
      platform:
        description: 'The platform to run molecule tests on'
        required: true
        default: 'ubuntu-latest'
        type: string
      collection-path:
        description: 'Path to the Ansible collection root'
        required: false
        default: '.'
        type: string
      force_all_roles:
        description: 'Set to true to run all roles regardless of the changeset'
        required: false
        default: false
        type: boolean

concurrency:
  group: >-
    ${{ github.workflow }}-${{
      github.event.pull_request.number || github.sha
    }}
  cancel-in-progress: true

jobs:

  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: tox-dev/action-pre-commit-uv@v1
        env:
          SKIP: ansible-lint


  ansible-lint:
    needs: pre-commit
    uses: ansible/ansible-content-actions/.github/workflows/ansible_lint.yaml@main
    with:
      working_directory: ${{ inputs.collection-path }}

  sanity:
    needs: ansible-lint
    name: Sanity (Ⓐ${{ matrix.ansible }})
    strategy:
      matrix:
        ansible:
          # It's important that Sanity is tested against all stable-X.Y branches
          # Testing against `devel` may fail as new tests are added.
          # An alternative to `devel` is the `milestone` branch with
          # gets synchronized with `devel` every few weeks and therefore
          # tends to be a more stable target. Be aware that it is not updated
          # around creation of a new stable branch, this might cause a problem
          # that two different versions of ansible-test use the same sanity test
          # ignore.txt file.
          # Add new versions announced in
          # https://github.com/ansible-collections/news-for-maintainers in a timely manner,
          # consider dropping testing against EOL versions and versions you don't support.
          - stable-2.16
          - stable-2.17
          - stable-2.18
        # - milestone

    runs-on: ubuntu-latest

    steps:
      # Run sanity tests inside a Docker container.
      # The docker container has all the pinned dependencies that are
      # required and all Python versions Ansible supports.
      - name: Perform sanity testing
        # See the documentation for the following GitHub action on
        # https://github.com/ansible-community/ansible-test-gh-action/blob/main/README.md
        uses: ansible-community/ansible-test-gh-action@release/v1
        with:
          ansible-core-version: ${{ matrix.ansible }}
          testing-type: sanity
          collection-root: ${{ inputs.collection-path }}
          # OPTIONAL If your sanity tests require code
          # from other collections, install them like this
          # test-deps: >-
          #   ansible.netcommon
          #   ansible.utils
          # OPTIONAL If set to true, will test only against changed files,
          # which should improve CI performance. See limitations on
          # https://github.com/ansible-community/ansible-test-gh-action#pull-request-change-detection
          pull-request-change-detection: false


  discover:
    runs-on: ubuntu-latest
    needs: sanity
    outputs:
      role_scenarios: ${{ steps.discover-scenarios.outputs.role_scenarios }}
    steps:
      - uses: actions/checkout@v6

      # Add a step to detect the event type
      - name: Set test scope
        id: scope
        run: |
          if [[ "${{ inputs.force_all_roles }}" == "true" ]]; then
            echo "all_roles=true" >> $GITHUB_OUTPUT
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" || "${{ github.event_name }}" == "schedule" ]]; then
            echo "all_roles=true" >> $GITHUB_OUTPUT
          else
            echo "all_roles=false" >> $GITHUB_OUTPUT
          fi

      # Add a step to list all roles when running full tests
      - name: List all roles
        id: list-roles
        if: steps.scope.outputs.all_roles == 'true'
        run: |
          echo "role_folders=$(find ${{ inputs.collection-path }}/roles/* -maxdepth 0 -type d -exec basename {} \; | tr '\n' ' ')" >> $GITHUB_OUTPUT

      - name: Find changeset
        if: steps.scope.outputs.all_roles == 'false'
        uses: dorny/paths-filter@v2
        id: filter
        with:
          base: ${{ github.ref }}
          list-files: shell
          filters: |
            role:
              - ${{ inputs.collection-path }}/roles/*/**

      - name: Discover scenarios for each role
        id: discover-scenarios
        run: |
          folders=()
          if [[ "${{ steps.scope.outputs.all_roles }}" == "true" ]]; then
            read -r -a folders <<< "${{ steps.list-roles.outputs.role_folders }}"
          else
            for f in ${{ steps.filter.outputs.role_files }}; do
              if [[ "$f" =~ (^|/)roles/([^/]+)/ ]]; then
                folders+=("${BASH_REMATCH[2]}")
              fi
            done
          fi

          unique_folders=($(printf "%s\n" "${folders[@]}" | sed '/^$/d' | sort -u))
          echo "Found ${#unique_folders[@]} changed/selected role(s)"

          # Build JSON array of role-scenario combinations
          role_scenarios_json=$(for role in "${unique_folders[@]}"; do
            molecule_dir="${{ inputs.collection-path }}/roles/$role/molecule"

            if [ ! -d "$molecule_dir" ]; then
              echo "Skipping $role: no molecule directory" >&2
              continue
            fi

            while IFS= read -r scenario; do
              if [ -n "$scenario" ]; then
                jq -n --arg role "$role" --arg scenario "$scenario" '{role: $role, scenario: $scenario}'
              fi
            done < <(find "$molecule_dir" -mindepth 1 -maxdepth 1 -type d -exec test -f '{}/molecule.yml' \; -printf '%f\n')
          done | jq -c -s .)

          # Output the result
          printf 'role_scenarios=%s\n' "$role_scenarios_json" >> "$GITHUB_OUTPUT"

          # Display summary
          count=$(echo "$role_scenarios_json" | jq '. | length')
          if [ "$count" -eq 0 ]; then
            echo "No role-scenario combinations found"
          else
            echo "Found $count role-scenario combination(s):"
            echo "$role_scenarios_json" | jq -r '.[] | "  - \(.role)/\(.scenario)"'
          fi

  molecule:
    needs: discover
    runs-on: ${{ inputs.platform }}
    if: ${{ needs.discover.outputs.role_scenarios != '' && toJson(fromJson(needs.discover.outputs.role_scenarios)) != '[]' }}
    strategy:
      matrix:
        include: ${{ fromJSON(needs.discover.outputs.role_scenarios) }}
      fail-fast: false
    steps:
      - uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Sync dependencies with uv
        run: uv sync --dev
        working-directory: ${{ inputs.collection-path }}

      - name: Run molecule tests for role ${{ matrix.role }} scenario ${{ matrix.scenario }}
        run: |
          uv run molecule --version
          uv run molecule test --scenario-name "${{ matrix.scenario }}" --parallel
        working-directory: "${{ inputs.collection-path }}/roles/${{ matrix.role }}"
        env:
          PY_COLORS: '1'
          ANSIBLE_FORCE_COLOR: '1'
          ANSIBLE_ROLES_PATH: "${GITHUB_WORKSPACE}/${{ inputs.collection-path }}/roles:~/.ansible/roles:/usr/share/ansible/roles:/etc/ansible/roles"

  check:  # This job does nothing and is only used for the branch protection
          # or multi-stage CI jobs, like making sure that all tests pass before
          # a publishing job is started.
    if: always()

    needs:
      - pre-commit
      - sanity
      - molecule

    runs-on: "ubuntu-latest"

    steps:
      - name: Decide whether the needed jobs succeeded or failed
        uses: re-actors/alls-green@release/v1
        with:
          jobs: ${{ toJSON(needs) }}
          allowed-skips: molecule
