name: test-self

on:
  workflow_dispatch:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  ansible-collection-legacy:
    uses: ./.github/workflows/ansible-collection.yml
    with:
      platform: ubuntu-latest
      collection-path: tests/ansible_collections/legacy_collection
      force_all_roles: true

  ansible-collection-native:
    uses: ./.github/workflows/ansible-collection.yml
    with:
      platform: ubuntu-latest
      collection-path: tests/ansible_collections/native_collection
      force_all_roles: true
