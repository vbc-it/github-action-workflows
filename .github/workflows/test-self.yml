name: test-self

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  ansible-collection:
    uses: ./.github/workflows/ansible-collection.yml
    with:
      platform: ubuntu-latest
      collection-path: tests/test_collection
      force_all_roles: ${{ contains(toJson(github.event.commits), '.github/workflows/ansible-collection.yml') }}
