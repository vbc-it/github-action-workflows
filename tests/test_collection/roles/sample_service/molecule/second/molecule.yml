---
dependency:
  name: galaxy

driver:
  name: podman

platforms:
  - name: service-alt
    image: docker.io/pycontribs/centos:8
    pre_build_image: true

provisioner:
  name: ansible
  inventory:
    host_vars:
      service-alt:
        ansible_user: root
        ansible_connection: podman
        ansible_python_interpreter: /usr/bin/python3
  playbooks:
    converge: converge.yml

verifier:
  name: ansible
