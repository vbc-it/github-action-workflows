---
dependency:
  name: galaxy

driver:
  name: podman

platforms:
  - name: instance_alma9
    image: quay.io/almalinuxorg/9-base
    pre_build_image: true
  - name: instance_alma10
    image: quay.io/almalinuxorg/10-base
    pre_build_image: true
    # change

provisioner:
  name: ansible
  playbooks:
    converge: ../../../../resources/converge.yml
    verify: ../../../../resources/verify.yml
  config_options:
    defaults:
      roles_path: "$MOLECULE_PROJECT_DIRECTORY/..:~/.ansible/roles"
verifier:
  name: ansible
